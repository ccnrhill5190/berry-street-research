<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Berry Street Research Repository</title>
<style>
  :root {
    --berry: #003E32;
    --berry-hover: #002822;
    --berry-light: #E6EFED;
    --green: #059669;
    --yellow: #D97706;
    --blue: #2563EB;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-900: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .hidden { display: none !important; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }

  /* TOP NAV */
  nav { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-size: 15px; font-weight: 700; color: var(--berry); letter-spacing: -.01em; flex: 1; }
  .nav-logo span { color: var(--gray-700); font-weight: 500; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--berry); color: white; }
  .btn-primary:hover { background: var(--berry-hover); }
  .btn-ghost { background: transparent; color: var(--gray-700); border: 1px solid var(--gray-300); }
  .btn-ghost:hover { background: var(--gray-100); }
  .btn-sm { padding: 5px 10px; font-size: 13px; }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 56px); }
  .sidebar { width: 280px; flex-shrink: 0; background: white; border-right: 1px solid var(--gray-200); padding: 20px 0; display: flex; flex-direction: column; }
  .sidebar-section { padding: 0 16px 8px; }
  .sidebar-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-500); padding: 8px 8px 4px; }
  .sidebar-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background .1s; border: none; background: none; width: 100%; text-align: left; }
  .sidebar-item:hover { background: var(--gray-100); }
  .sidebar-item.active { background: var(--berry-light); }
  .sidebar-item .icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
  .sidebar-item .title { font-size: 14px; font-weight: 500; color: var(--gray-900); display: block; }
  .sidebar-item .subtitle { font-size: 12px; color: var(--gray-500); display: block; margin-top: 1px; }
  .sidebar-item.active .title { color: var(--berry); }

  /* FILTER CHIPS */
  .filters { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
  .chip { padding: 4px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--gray-300); background: white; color: var(--gray-700); transition: all .15s; }
  .chip:hover { border-color: var(--berry); color: var(--berry); }
  .chip.active { background: var(--berry); color: white; border-color: var(--berry); }

  /* MAIN */
  .main { flex: 1; padding: 32px; overflow-y: auto; }
  .main-header { margin-bottom: 24px; }
  .main-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .main-header p { font-size: 14px; color: var(--gray-600); }

  /* STUDY CARDS GRID */
  .study-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .study-card { background: white; border: 1px solid var(--gray-200); border-radius: 12px; padding: 20px; cursor: pointer; transition: box-shadow .15s, border-color .15s; display: flex; flex-direction: column; }
  .study-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: var(--berry); }
  .study-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .type-badge { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; padding: 3px 10px; border-radius: 20px; }
  .type-survey { background: #EDE9FE; color: #6D28D9; }
  .type-interview { background: #D1FAE5; color: #065F46; }
  .type-usability { background: #DBEAFE; color: #1D4ED8; }
  .type-analytics { background: #FEF3C7; color: #92400E; }
  .status-badge { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
  .status-badge.complete { color: var(--green); }
  .status-badge.active { color: var(--blue); }
  .status-badge.planned { color: var(--gray-500); }
  .study-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .study-card .desc { font-size: 13px; color: var(--gray-600); line-height: 1.5; margin-bottom: 14px; flex: 1; }
  .study-card-meta { display: flex; gap: 12px; font-size: 12px; color: var(--gray-500); margin-bottom: 14px; flex-wrap: wrap; }
  .study-card-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .link-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; background: var(--gray-100); color: var(--gray-700); text-decoration: none; border: 1px solid var(--gray-200); transition: all .15s; }
  .link-chip:hover { background: var(--berry-light); color: var(--berry); border-color: var(--berry); }
  .link-chip.results { background: var(--berry); color: white; border-color: var(--berry); }
  .link-chip.results:hover { background: var(--berry-hover); }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--gray-500); }
  .empty p { font-size: 15px; margin-bottom: 4px; }

  /* MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-backdrop.hidden { display: none; }
  .modal { background: white; border-radius: 16px; width: 100%; max-width: 540px; padding: 28px; position: relative; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-close { position: absolute; top: 20px; right: 20px; background: var(--gray-100); border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: var(--gray-200); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--gray-700); }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--berry); }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .link-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .link-row { display: flex; gap: 8px; }
  .link-row input { flex: 1; }
  .link-row input:first-child { flex: 0 0 110px; }
  .remove-link { background: none; border: 1px solid var(--gray-300); border-radius: 6px; padding: 0 8px; cursor: pointer; color: var(--gray-500); font-size: 18px; line-height: 1; }
  .remove-link:hover { background: #FEE2E2; border-color: #FCA5A5; color: #DC2626; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--gray-200); }

  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--gray-200); padding: 10px 0; }
    .main { padding: 20px; }
    .study-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Berry Street <span>Research</span></div>
  <button class="btn btn-primary" onclick="openModal()">+ Add Research Study</button>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="filters" id="typeFilters">
      <div class="chip active" onclick="filterType('all', this)">All</div>
      <div class="chip" onclick="filterType('survey', this)">Surveys</div>
      <div class="chip" onclick="filterType('interview', this)">Interviews</div>
      <div class="chip" onclick="filterType('usability', this)">Usability</div>
      <div class="chip" onclick="filterType('analytics', this)">Analytics</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Studies</div>
      <div id="sidebarList"></div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1>Research Repository</h1>
      <p>Provider profile &amp; prep experience research</p>
    </div>
    <div class="study-grid" id="studyGrid"></div>
    <div class="empty hidden" id="emptyState">
      <p>No studies match this filter.</p>
    </div>
  </main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-backdrop hidden" id="modalBackdrop" onclick="closeModalIfBackdrop(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modalTitle">Add Research Study</h2>
    <input type="hidden" id="editingId" />

    <div class="form-group">
      <label>Study title</label>
      <input type="text" id="fTitle" placeholder="e.g. Provider Profile Card Sort" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Brief summary of what this study covers and what you were trying to learn."></textarea>
    </div>
    <div style="display:flex;gap:12px">
      <div class="form-group" style="flex:1">
        <label>Type</label>
        <select id="fType">
          <option value="survey">Survey / Card Sort</option>
          <option value="interview">Interview</option>
          <option value="usability">Usability Test</option>
          <option value="analytics">Analytics</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label>Status</label>
        <select id="fStatus">
          <option value="complete">Complete</option>
          <option value="active">Active / In Progress</option>
          <option value="planned">Planned</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:12px">
      <div class="form-group" style="flex:1">
        <label>Participants</label>
        <input type="text" id="fParticipants" placeholder="e.g. 151 providers" />
      </div>
      <div class="form-group" style="flex:1">
        <label>Date / period</label>
        <input type="text" id="fDate" placeholder="e.g. May–Jun 2026" />
      </div>
    </div>

    <div class="form-group">
      <label>Links</label>
      <div class="link-rows" id="linkRows"></div>
      <button class="btn btn-ghost btn-sm" onclick="addLinkRow()">+ Add link</button>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudy()">Save Study</button>
    </div>
  </div>
</div>

<script>
// ── Default data ──────────────────────────────────────────────
const DEFAULT_STUDIES = [
  {
    id: 'study-1',
    title: 'Provider Profile Card Sort',
    desc: 'Card sort + open-ended survey asking 151 providers what they review before and between sessions. Used to prioritize the provider prep view redesign.',
    type: 'survey',
    status: 'complete',
    participants: '151 providers',
    date: 'May–Jun 2026',
    links: [
      { label: '📋 Survey', url: 'https://ccnrhill5190.github.io/provider-ranking/' },
      { label: '📊 Responses', url: 'https://docs.google.com/spreadsheets/d/1EdaO4KAvEqrhyQSdj05qeTzFPW_tGj1hhhsFrkkD9kw/edit' },
      { label: '📄 Results', url: 'provider-survey-synthesis.html', isResults: true },
    ]
  }
];

// ── State ─────────────────────────────────────────────────────
let studies = [];
let activeFilter = 'all';

function load() {
  const saved = localStorage.getItem('bs-research-studies');
  studies = saved ? JSON.parse(saved) : [...DEFAULT_STUDIES];
}

function save() {
  localStorage.setItem('bs-research-studies', JSON.stringify(studies));
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const filtered = activeFilter === 'all' ? studies : studies.filter(s => s.type === activeFilter);
  renderGrid(filtered);
  renderSidebar(filtered);
  document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);
}

function renderGrid(list) {
  const grid = document.getElementById('studyGrid');
  grid.innerHTML = list.map(s => `
    <div class="study-card" onclick="openDetail('${s.id}')">
      <div class="study-card-top">
        <span class="type-badge type-${s.type}">${typeLabel(s.type)}</span>
        <span class="status-badge ${s.status}">${statusDot(s.status)} ${statusLabel(s.status)}</span>
      </div>
      <h3>${esc(s.title)}</h3>
      <p class="desc">${esc(s.desc)}</p>
      <div class="study-card-meta">
        ${s.participants ? `<span>👥 ${esc(s.participants)}</span>` : ''}
        ${s.date ? `<span>📅 ${esc(s.date)}</span>` : ''}
      </div>
      <div class="study-card-links" onclick="event.stopPropagation()">
        ${(s.links||[]).map(l => `
          <a class="link-chip${l.isResults ? ' results' : ''}" href="${esc(l.url)}" target="${l.isResults ? '_self' : '_blank'}" rel="noopener">${esc(l.label)}</a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderSidebar(list) {
  const el = document.getElementById('sidebarList');
  el.innerHTML = list.map(s => `
    <button class="sidebar-item" onclick="openDetail('${s.id}')">
      <span class="icon">${typeIcon(s.type)}</span>
      <span>
        <span class="title">${esc(s.title)}</span>
        <span class="subtitle">${s.date || ''} · ${s.participants || ''}</span>
      </span>
    </button>
  `).join('');
}

// ── Filter ────────────────────────────────────────────────────
function filterType(type, el) {
  activeFilter = type;
  document.querySelectorAll('#typeFilters .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Detail (opens synthesis page or falls back to edit) ───────
function openDetail(id) {
  const s = studies.find(x => x.id === id);
  if (!s) return;
  const resultsLink = (s.links||[]).find(l => l.isResults);
  if (resultsLink) {
    window.open(resultsLink.url, '_self');
  } else {
    openModal(id);
  }
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById('modalBackdrop').classList.remove('hidden');
  const study = id ? studies.find(s => s.id === id) : null;
  document.getElementById('modalTitle').textContent = study ? 'Edit Study' : 'Add Research Study';
  document.getElementById('editingId').value = id || '';
  document.getElementById('fTitle').value = study?.title || '';
  document.getElementById('fDesc').value = study?.desc || '';
  document.getElementById('fType').value = study?.type || 'survey';
  document.getElementById('fStatus').value = study?.status || 'complete';
  document.getElementById('fParticipants').value = study?.participants || '';
  document.getElementById('fDate').value = study?.date || '';
  const rows = document.getElementById('linkRows');
  rows.innerHTML = '';
  (study?.links || []).forEach(l => addLinkRow(l.label, l.url, l.isResults));
  if (!study || !study.links?.length) addLinkRow();
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.add('hidden');
}

function closeModalIfBackdrop(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

function addLinkRow(label='', url='', isResults=false) {
  const row = document.createElement('div');
  row.className = 'link-row';
  row.innerHTML = `
    <input type="text" placeholder="Label" value="${esc(label)}" style="flex:0 0 120px" />
    <input type="text" placeholder="URL or relative path" value="${esc(url)}" />
    <label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap">
      <input type="checkbox" ${isResults ? 'checked' : ''} /> Results
    </label>
    <button class="remove-link" onclick="this.closest('.link-row').remove()">×</button>
  `;
  document.getElementById('linkRows').appendChild(row);
}

function saveStudy() {
  const id = document.getElementById('editingId').value;
  const linkRows = [...document.querySelectorAll('#linkRows .link-row')];
  const links = linkRows.map(r => {
    const inputs = r.querySelectorAll('input[type=text]');
    const isResults = r.querySelector('input[type=checkbox]').checked;
    return { label: inputs[0].value.trim(), url: inputs[1].value.trim(), isResults };
  }).filter(l => l.label && l.url);

  const study = {
    id: id || 'study-' + Date.now(),
    title: document.getElementById('fTitle').value.trim(),
    desc: document.getElementById('fDesc').value.trim(),
    type: document.getElementById('fType').value,
    status: document.getElementById('fStatus').value,
    participants: document.getElementById('fParticipants').value.trim(),
    date: document.getElementById('fDate').value.trim(),
    links
  };

  if (!study.title) { alert('Please enter a title.'); return; }

  if (id) {
    const idx = studies.findIndex(s => s.id === id);
    if (idx >= 0) studies[idx] = study; else studies.push(study);
  } else {
    studies.push(study);
  }

  save();
  render();
  closeModal();
}

// ── Helpers ───────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function typeLabel(t) { return { survey:'Survey', interview:'Interview', usability:'Usability', analytics:'Analytics' }[t] || t; }
function typeIcon(t) { return { survey:'📋', interview:'🎙️', usability:'🖥️', analytics:'📊' }[t] || '📌'; }
function statusLabel(t) { return { complete:'Complete', active:'In Progress', planned:'Planned' }[t] || t; }
function statusDot(t) { return { complete:'●', active:'◉', planned:'○' }[t] || '○'; }

// ── Init ──────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
